<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Campus Events Directory{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fcfcfc;
        --surface: #ffffff;
        --surface-strong: #fff2b8;
        --text: #1f1f1f;
        --muted: #5a5a5a;
        --accent: #2f2f2f;
        --accent-soft: #fff8d9;
        --border: #e3e3e3;
        --danger: #9b2c2c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: var(--accent);
      }

      .site-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .site-header {
        background: #2c2c2c;
        color: #ffd54f;
        padding: 1.25rem 1.5rem;
      }

      .site-header h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
      }

      .site-header p {
        margin: 0.5rem 0 0;
        color: #ffefad;
      }

      .site-nav {
        margin-top: 1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .site-nav a {
        text-decoration: none;
        color: #ffe48a;
        padding: 0.6rem 0.95rem;
        border: 1px solid rgba(255, 212, 79, 0.6);
        border-radius: 999px;
      }

      .content {
        width: min(1100px, calc(100% - 2rem));
        margin: 2rem auto 3rem;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 10px 24px rgba(24, 24, 24, 0.06);
      }

      .panel + .panel {
        margin-top: 1.25rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .event-card,
      .category-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 1.1rem;
        background: #ffffff;
      }

      .eyebrow {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.8rem;
      }

      .message-list {
        list-style: none;
        padding: 0;
        margin: 0 0 1rem;
      }

      .message-list li {
        padding: 0.9rem 1rem;
        border-radius: 12px;
        background: var(--accent-soft);
        border: 1px solid #f3d56a;
      }

      .form-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        grid-column: span 3;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .form-field.half {
        grid-column: span 6;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 0.8rem 0.9rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        font: inherit;
      }

      .button,
      button {
        border: none;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        background: #ffd54f;
        color: #1f1f1f;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }

      .search-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: end;
      }

      .search-row .form-field {
        flex: 1 1 280px;
      }

      .meta-list {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }

      .meta-item {
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #ffffff;
      }

      .detail-list {
        margin-top: 1.2rem;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }

      .detail-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 1rem;
        padding: 0.9rem 1rem;
        background: #ffffff;
        border-bottom: 1px solid var(--border);
      }

      .detail-row:last-child {
        border-bottom: none;
      }

      .detail-row dt {
        font-weight: 700;
        color: var(--muted);
      }

      .detail-row dd {
        margin: 0;
      }

      .errorlist {
        margin: 0;
        padding-left: 1.2rem;
        color: var(--danger);
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1.25rem;
        align-items: center;
      }

      .pagination a,
      .pagination span {
        padding: 0.6rem 0.85rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--text);
        background: #ffffff;
      }

      .pagination .current {
        background: var(--surface-strong);
        font-weight: 700;
      }

      .empty-state {
        color: var(--muted);
        font-style: italic;
      }

      @media (max-width: 640px) {
        .content {
          width: min(100% - 1rem, 1100px);
        }

        .form-field,
        .form-field.half {
          grid-column: 1 / -1;
        }

        .site-header,
        .panel {
          padding: 1rem;
        }

        .detail-row {
          grid-template-columns: 1fr;
          gap: 0.35rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <h1>Campus Events Directory</h1>
        <p>
          Browse approved events, explore categories, and submit new activities
          for moderation.
        </p>
        <nav class="site-nav">
          <a href="{% url 'events_app:event_list' %}">Approved Events</a>
          <a href="{% url 'events_app:category_list' %}">Categories</a>
          <a href="{% url 'events_app:event_create' %}">Submit Event</a>
          <a href="/admin/">Admin</a>
        </nav>
      </header>

      <main class="content">
        {% if messages %}
        <ul class="message-list">
          {% for message in messages %}
          <li>{{ message }}</li>
          {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
